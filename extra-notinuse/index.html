<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #ffb347, #ff6a00 35%, #1b0b00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: absolute;
            width: 650px;
            height: 650px;
            background: rgba(255, 255, 255, 0.13);
            border-radius: 50%;
            top: -220px;
            right: -180px;
            filter: blur(8px);
        }

        body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 179, 71, 0.28);
            border-radius: 50%;
            bottom: -180px;
            left: -150px;
            filter: blur(12px);
        }

        .box {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 850px;
            padding: 70px 35px;
            text-align: center;
            color: #ffffff;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.13);
            border: 1px solid rgba(255, 255, 255, 0.32);
            box-shadow: 0 35px 90px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
        }

        .box::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 35px;
            padding: 2px;
            background: linear-gradient(135deg, #ffffff, #ffcc80, transparent, #ffffff);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.7;
        }

        h1 {
            font-size: clamp(52px, 9vw, 110px);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 18px;
            text-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        }

        p {
            font-size: clamp(18px, 3vw, 28px);
            color: #fff3e0;
            letter-spacing: 1px;
        }

        .glow {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: #ffffff;
            opacity: 0.14;
            filter: blur(20px);
            animation: moveGlow 5s infinite alternate ease-in-out;
        }

        .glow-one {
            top: 15%;
            left: 12%;
        }

        .glow-two {
            right: 14%;
            bottom: 16%;
            animation-delay: 1.5s;
        }

        @keyframes moveGlow {
            from {
                transform: translateY(0) scale(1);
            }

            to {
                transform: translateY(-35px) scale(1.15);
            }
        }

        @media (max-width: 600px) {
            .box {
                padding: 55px 22px;
                border-radius: 26px;
            }

            .box::before {
                border-radius: 26px;
            }
        }
    </style>

<style>
#scrollTopBtn{
position:fixed;
bottom:24px;
right:24px;
width:52px;
height:52px;
border:none;
border-radius:50%;
background:#0f172a;
color:#fff;
font-size:22px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,.25);
opacity:0;
visibility:hidden;
transform:translateY(20px);
transition:all .3s ease;
z-index:9999;
}
#scrollTopBtn.show{
opacity:1;
visibility:visible;
transform:translateY(0);
}
@media(max-width:768px){
#scrollTopBtn{
width:46px;
height:46px;
font-size:18px;
bottom:18px;
right:18px;
}
}
</style>

</head>

<body>

    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>

    <div class="box">
        <h1>Launching Soon</h1>
        <p>Website will be live shortly.</p>
    </div>


<button id="scrollTopBtn" aria-label="Scroll to top">↑</button>
<script>
const scrollTopBtn=document.getElementById('scrollTopBtn');
window.addEventListener('scroll',()=>{
if(window.scrollY>300){
scrollTopBtn.classList.add('show');
}else{
scrollTopBtn.classList.remove('show');
}
});
scrollTopBtn.addEventListener('click',()=>{
window.scrollTo({top:0,behavior:'smooth'});
});
</script>

</body>
</html>
