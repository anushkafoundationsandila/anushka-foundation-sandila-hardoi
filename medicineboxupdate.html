<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anushka Foundation Medical Slip</title>
    <style>
        /* CSS Reset to prevent overflow */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Fixed Box Container - Content safe inside */
        .slip-container {
            width: 480px;
            max-width: 100%;
            background: #ffffff;
            border: 3px solid #0056b3;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            position: relative;
            background-image: linear-gradient(180deg, #f0f7ff 0%, #ffffff 100px);
            overflow: hidden; /* Bahar jane se rokta hai */
        }

        /* Top Bar (Ministry & DDAC) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #bce0fd;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }

        .ministry-title {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            color: #495057;
            letter-spacing: 0.3px;
        }

        .ddac-title {
            font-size: 13px;
            font-weight: 800;
            color: #dc3545;
            background: #ffe3e5;
            padding: 1px 8px;
            border-radius: 4px;
        }

        /* Main Foundation Header */
        .header {
            text-align: center;
            border-bottom: 2px dashed #0056b3;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .foundation-title {
            font-size: 20px;
            font-weight: 800;
            color: #0056b3;
            letter-spacing: 0.5px;
        }

        .foundation-sub {
            font-size: 12px;
            font-weight: 700;
            color: #28a745;
            margin: 2px 0;
        }

        .foundation-details {
            font-size: 10px;
            color: #6c757d;
            line-height: 1.3;
        }

        /* Patient Information Grid */
        .patient-info {
            display: grid;
            grid-template-columns: 2fr 1fr; 
            gap: 10px;
            margin-bottom: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        .three-col-wrapper {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: #495057;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%; 
            border: none;
            border-bottom: 1px solid #b5bfc9;
            padding: 3px 0;
            font-size: 13px;
            font-weight: bold;
            color: #212529;
            outline: none;
            background: transparent;
        }

        input[type="text"]:focus {
            border-bottom-color: #0056b3;
        }

        /* Treatment Type / Checkbox Section */
        .treatment-section {
            background: #fff9db;
            border: 1px solid #ffe066;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: #343a40;
            cursor: pointer;
        }

        .checkbox-item input {
            margin-right: 4px;
            width: 14px;
            height: 14px;
            accent-color: #0056b3;
        }

        .other-input-box {
            display: flex;
            flex-direction: column;
            margin-top: 4px;
        }

        /* Footer Layout with Logo & Created By */
        .footer-layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid #dee2e6;
            padding-top: 8px;
            margin-bottom: 5px;
        }

        .created-by {
            font-size: 11px;
            color: #495057;
            font-weight: 600;
            flex: 1;
        }

        .logo-area {
            flex-shrink: 0;
            margin-left: 10px;
        }

        /* Small Corner Logo */
        .foundation-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            border: 1px solid #dee2e6;
            padding: 2px;
            border-radius: 4px;
            background: #fff;
            display: block;
        }

        /* Developer/System Tag Bottom Row */
        .developer-tag-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 5px;
            border-top: 1px dotted #e9ecef;
            padding-top: 4px;
        }

        .dev-text {
            font-size: 8.5px;
            color: #868e96;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Action Buttons */
        .actions {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }

        .print-btn {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,86,179,0.2);
            transition: all 0.2s;
        }

        .print-btn:hover {
            background-color: #004085;
        }

        /* Printing Adjustments */
        @page { size:A4; margin:12mm; }
@media print {
body{
 display:flex !important;
 justify-content:center !important;
 align-items:flex-start !important;
}
.slip-container{
 width:170mm !important;
 margin:auto !important;
}

            body {
                background: white;
                padding: 0;
            }
            .slip-container {
                box-shadow: none;
                border: 2px solid #0056b3;
                width: 100%;
                background-image: none;
            }
            .actions {
                display: none;
            }
            input[type="text"] {
                border-bottom: none;
            }
        }
    
@page { size:A4; margin:12mm; }
@media print {
body{
 display:flex !important;
 justify-content:center !important;
 align-items:flex-start !important;
}
.slip-container{
 width:170mm !important;
 margin:auto !important;
}

    .no-print {
        display:none !important;
    }
}

</style>
</head>
<body>

    <div class="slip-container">
        <!-- Ministry & DDAC Header -->
        <div class="top-bar">
            <span class="ministry-title">Ministry of Social Justice & Empowerment</span>
            <span class="ddac-title">Box No. <input type="text" style="width:60px;border:none;border-bottom:1px solid #555;background:transparent;font-weight:bold;"></span>
        </div>

        <!-- Anushka Foundation Header -->
        <div class="header">
            <div class="foundation-title">ANUSHKA FOUNDATION</div>
            <div class="foundation-sub">Nasha Mukti Kendra | नशा मुक्ति केंद्र</div>
            <div class="foundation-details">
                Opposite New Tehsil, Highway Road, Sandila, Hardoi (U.P.)<br>
                Contact: +91-9793973143
            </div>
        </div>

        <!-- Patient Demographics Section -->
        <div class="patient-info">
            <div class="form-group">
                <label>Patient Name / मरीज का नाम</label>
                <input type="text" placeholder="Full Name">
            </div>
            <div class="form-group">
                <label>Date / दिनांक</label>
                <input type="text" id="current-date">
            </div>
            
            <!-- Age, Gender, OPD fields -->
            <div class="three-col-wrapper">
                <div class="form-group">
                    <label>Age / आयु</label>
                    <input type="text" placeholder="e.g. 28">
                </div>
                <div class="form-group">
                    <label>Gender / लिंग</label>
                    <input type="text" placeholder="M/F/O">
                </div>
                <div class="form-group">
                    <label>Bed No. / बेड नं.</label>
                    <input type="text" placeholder="e.g. 1042">
                </div>
            </div>

            <div class="form-group full-width" style="margin-top: 2px;">
                <label style="color: #d9480f;">Treatment Under (Doctor Name)</label>
                <input type="text" placeholder="Dr. Name / Consultant" style="color: #d9480f;">
            </div>
        </div>

        <!-- Medical Treatments and Checkboxes -->
        <div class="treatment-section">
            <label style="color: #0056b3; display: block; margin-bottom: 6px; font-size: 11px;">Prescribed Items / उपचार प्रकार</label>
            
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox"> Medicine</label>
                <label class="checkbox-item"><input type="checkbox"> Syrup</label>
                <label class="checkbox-item"><input type="checkbox"> Bandage</label>
                <label class="checkbox-item"><input type="checkbox"> Other</label>
            </div>

            <div class="other-input-box">
                <label style="font-size: 9px; color: #666;">If Other / Details (विवरण लिखें):</label>
                <input type="text" placeholder="Type instructions or items here...">
            </div>
        </div>

        
        <!-- Medicine Selection Section -->
        <div class="treatment-section" style="margin-top:10px;">
            <label style="color:#0056b3; display:block; margin-bottom:8px; font-size:11px;">
                Medicines / दवाइयाँ
            </label>

            <div id="medicineContainer">
<select style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; font-size:12px;">
                <option>Select Medicine / दवा चुनें</option>
                <option>Lorazepam 1 mg Tablet / लोराजेपाम 1 एमजी टैबलेट</option>
                <option>Lorazepam 2 mg Tablet / लोराजेपाम 2 एमजी टैबलेट</option>
                <option>Disulfiram 250 mg Tablet / डिसुलफिरम 250 एमजी टैबलेट</option>
                <option>Disulfiram 500 mg Tablet / डिसुलफिरम 500 एमजी टैबलेट</option>
                <option>Ozom-DM Capsule / ओजोम-डीएम कैप्सूल</option>
                <option>Accured (Lycopene) Capsule / एक्यूर्ड (लाइकोपीन) कैप्सूल</option>
                <option>Methadone 500 mg Tablet / मेथाडोन 500 एमजी टैबलेट</option>
                <option>Methadone 1000 mg Tablet / मेथाडोन 1000 एमजी टैबलेट</option>
                <option>Buprenorphine 0.2 mg Tablet / बुप्रेनॉर्फिन 0.2 एमजी टैबलेट</option>
                <option>Buprenorphine 20 mg Transdermal Patch / बुप्रेनॉर्फिन 20 ट्रांसडर्मल पैच</option>
                <option>Naltrexone 50 mg Tablet / नाल्ट्रेक्सोन 50 एमजी टैबलेट</option>
                <option>Nicotine Polacrilex 4 mg Gum / निकोटीन पॉलीक्रिलेक्स 4 एमजी गम</option>
                <option>Nicotine Polacrilex 2 mg Gum / निकोटीन पॉलीक्रिलेक्स 2 एमजी गम</option>
                <option>Bupropion 150 mg Tablet / बुप्रोपियन 150 एमजी टैबलेट</option>
                <option>Bupropion 300 mg Tablet / बुप्रोपियन 300 एमजी टैबलेट</option>
                <option>Acamprosate 333 mg Tablet / एकाम्प्रोसेट 333 एमजी टैबलेट</option>
                <option>Acamprosate 666 mg Tablet / एकाम्प्रोसेट 666 एमजी टैबलेट</option>
                <option>Gabapentin 400 mg Tablet / गैबापेंटिन 400 एमजी टैबलेट</option>
                <option>Gabapentin 400 mg + Nortriptyline 10 mg Tablet / गैबापेंटिन 400 + नॉरट्रिप्टिलाइन 10 एमजी</option>
                <option>FBC Forte Capsule / एफबीसी फोर्ट कैप्सूल</option>
                <option>Amlorya 10 mg (Amitriptyline) / एमलोर्या 10 एमजी</option>
                <option>Mesopram-DS (Escitalopram 10 mg + Clonazepam 0.5 mg) / मेसोप्राम-डीएस</option>
            </select>
</div>

<div class="no-print" style="margin-top:8px; display:flex; gap:6px;">
<button type="button" onclick="addMedicine()" style="padding:6px 10px;">+ Add Medicine</button>
<button type="button" onclick="removeMedicine()" style="padding:6px 10px;">− Remove</button>
</div>

            <div style="margin-top:8px;">
                <input type="text" placeholder="Add Medicine Name + Dose / दवा का नाम व डोज लिखें"
                style="width:100%; padding:6px;">
            </div>
        </div>


        <!-- Footer Area (Signature, Created By and Logo) -->
        <div class="footer-layout">
            <div class="created-by">
                <span style="display: block; font-size: 9px; color: #868e96; text-transform: uppercase;">Doctor Sign: _____________</span>
                <div style="margin-top: 10px;">Anushka Foundation Stamp: <input type="text" style="width: 110px; font-size: 11px; font-weight: normal; border-bottom: 1px dotted #999;"></div>
            </div>
            
            <div class="logo-area">
                <img src="https://www.anushkafoundationsandilahardoi.in/assets/images/logo.png" alt="Logo" class="foundation-logo">
            </div>
        </div>

        <!-- Horizontal Developer Tag at the bottom right corner -->
        <div class="developer-tag-row">
            <span class="dev-text">Slip Generation by itdts (+91-8299357488)</span>
        </div>

        <!-- Print Button -->
        <div class="actions no-print">
            <button class="print-btn" onclick="window.print()">Print Patient Slip</button>
        </div>
    </div>

    <script>
        // Automatic date generator
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        document.getElementById('current-date').value = `${dd}/${mm}/${yyyy}`;
    </script>


<script>
function medicineOptions(){
return `
<option>Select Medicine / दवा चुनें</option>
<option>Lorazepam 1 mg Tablet / लोराजेपाम 1 एमजी टैबलेट</option>
<option>Lorazepam 2 mg Tablet / लोराजेपाम 2 एमजी टैबलेट</option>
<option>Disulfiram 250 mg Tablet / डिसुलफिरम 250 एमजी टैबलेट</option>
<option>Disulfiram 500 mg Tablet / डिसुलफिरम 500 एमजी टैबलेट</option>
<option>Ozom-DM Capsule / ओजोम-डीएम कैप्सूल</option>
<option>Accured (Lycopene) Capsule / एक्यूर्ड (लाइकोपीन) कैप्सूल</option>
<option>Methadone 500 mg Tablet</option>
<option>Methadone 1000 mg Tablet</option>
<option>Buprenorphine 0.2 mg Tablet</option>
<option>Buprenorphine 20 mg Transdermal Patch</option>
<option>Naltrexone 50 mg Tablet</option>
<option>Nicotine Polacrilex 4 mg Gum</option>
<option>Nicotine Polacrilex 2 mg Gum</option>
<option>Bupropion 150 mg Tablet</option>
<option>Bupropion 300 mg Tablet</option>
<option>Acamprosate 333 mg Tablet</option>
<option>Acamprosate 666 mg Tablet</option>
<option>Gabapentin 400 mg Tablet</option>
<option>Gabapentin + Nortriptyline Tablet</option>
<option>FBC Forte Capsule</option>
<option>Amlorya 10 mg</option>
<option>Mesopram-DS</option>`;
}

function addMedicine(){
 const div=document.createElement('div');
 div.style.marginTop='6px';
 div.innerHTML=`<select style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; font-size:12px;">${medicineOptions()}</select>`;
 document.getElementById('medicineContainer').appendChild(div);
}

function removeMedicine(){
 const c=document.getElementById('medicineContainer');
 if(c.children.length>1){ c.removeChild(c.lastElementChild); }
}
</script>

<script>
function prepareForPrint(){
  document.querySelectorAll('input[type="text"]').forEach(function(inp){
      let span=document.createElement('span');
      span.className='print-value';
      span.textContent=inp.value || '____________';
      span.style.fontWeight='bold';
      span.style.display='none';
      inp.parentNode.insertBefore(span, inp.nextSibling);
  });

  const style=document.createElement('style');
  style.innerHTML=`
  @media print{
    input[type="text"]{display:none !important;}
    .print-value{display:inline !important;}
  }`;
  document.head.appendChild(style);
}

window.addEventListener('beforeprint', prepareForPrint);
</script>
</body>

</html>
