<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anushka Foundation Medical Slip</title>
    <style>
        /* CSS Reset to prevent overflow */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Fixed Box Container - Content safe inside */
        .slip-container {
            width: 480px;
            max-width: 100%;
            background: #ffffff;
            border: 3px solid #0056b3;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            position: relative;
            background-image: linear-gradient(180deg, #f0f7ff 0%, #ffffff 100px);
            overflow: hidden; /* Bahar jane se rokta hai */
        }

        /* Top Bar (Ministry & DDAC) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #bce0fd;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }

        .ministry-title {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            color: #495057;
            letter-spacing: 0.3px;
        }

        .ddac-title {
            font-size: 13px;
            font-weight: 800;
            color: #dc3545;
            background: #ffe3e5;
            padding: 1px 8px;
            border-radius: 4px;
        }

        /* Main Foundation Header */
        .header {
            text-align: center;
            border-bottom: 2px dashed #0056b3;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .foundation-title {
            font-size: 20px;
            font-weight: 800;
            color: #0056b3;
            letter-spacing: 0.5px;
        }

        .foundation-sub {
            font-size: 12px;
            font-weight: 700;
            color: #28a745;
            margin: 2px 0;
        }

        .foundation-details {
            font-size: 10px;
            color: #6c757d;
            line-height: 1.3;
        }

        /* Patient Information Grid */
        .patient-info {
            display: grid;
            grid-template-columns: 2fr 1fr; 
            gap: 10px;
            margin-bottom: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        .three-col-wrapper {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: #495057;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%; 
            border: none;
            border-bottom: 1px solid #b5bfc9;
            padding: 3px 0;
            font-size: 13px;
            font-weight: bold;
            color: #212529;
            outline: none;
            background: transparent;
        }

        input[type="text"]:focus {
            border-bottom-color: #0056b3;
        }

        /* Treatment Type / Checkbox Section */
        .treatment-section {
            background: #fff9db;
            border: 1px solid #ffe066;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: #343a40;
            cursor: pointer;
        }

        .checkbox-item input {
            margin-right: 4px;
            width: 14px;
            height: 14px;
            accent-color: #0056b3;
        }

        .other-input-box {
            display: flex;
            flex-direction: column;
            margin-top: 4px;
        }

        /* Footer Layout with Logo & Created By */
        .footer-layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid #dee2e6;
            padding-top: 8px;
            margin-bottom: 5px;
        }

        .created-by {
            font-size: 11px;
            color: #495057;
            font-weight: 600;
            flex: 1;
        }

        .logo-area {
            flex-shrink: 0;
            margin-left: 10px;
        }

        /* Small Corner Logo */
        .foundation-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            border: 1px solid #dee2e6;
            padding: 2px;
            border-radius: 4px;
            background: #fff;
            display: block;
        }

        /* Developer/System Tag Bottom Row */
        .developer-tag-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 5px;
            border-top: 1px dotted #e9ecef;
            padding-top: 4px;
        }

        .dev-text {
            font-size: 8.5px;
            color: #868e96;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Action Buttons */
        .actions {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }

        .print-btn {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,86,179,0.2);
            transition: all 0.2s;
        }

        .print-btn:hover {
            background-color: #004085;
        }

        /* Printing Adjustments */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .slip-container {
                box-shadow: none;
                border: 2px solid #0056b3;
                width: 100%;
                background-image: none;
            }
            .actions {
                display: none;
            }
            input[type="text"] {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>

    <div class="slip-container">
        <!-- Ministry & DDAC Header -->
        <div class="top-bar">
            <span class="ministry-title">Ministry of Social Justice & Empowerment</span>
            <span class="ddac-title">Box No. ____</span>
        </div>

        <!-- Anushka Foundation Header -->
        <div class="header">
            <div class="foundation-title">ANUSHKA FOUNDATION</div>
            <div class="foundation-sub">Nasha Mukti Kendra | नशा मुक्ति केंद्र</div>
            <div class="foundation-details">
                Opposite New Tehsil, Highway Road, Sandila, Hardoi (U.P.)<br>
                Contact: +91-9793973143
            </div>
        </div>

        <!-- Patient Demographics Section -->
        <div class="patient-info">
            <div class="form-group">
                <label>Patient Name</label>
                <input type="text" placeholder="Full Name">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="text" id="current-date">
            </div>
            
            <!-- Age, Gender, OPD fields -->
            <div class="three-col-wrapper">
                <div class="form-group">
                    <label>Age</label>
                    <input type="text" placeholder="e.g. 28">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <input type="text" placeholder="M/F/O">
                </div>
                <div class="form-group">
                    <label>Bed No.</label>
                    <input type="text" placeholder="e.g. 1042">
                </div>
            </div>

            <div class="form-group full-width" style="margin-top: 2px;">
                <label style="color: #d9480f;">Treatment Under (Doctor Name)</label>
                <input type="text" placeholder="Dr. Name / Consultant" style="color: #d9480f;">
            </div>
        </div>

        <!-- Medical Treatments and Checkboxes -->
        <div class="treatment-section">
            <label style="color: #0056b3; display: block; margin-bottom: 6px; font-size: 11px;">Prescribed Items / उपचार प्रकार</label>
            
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox"> Medicine</label>
                <label class="checkbox-item"><input type="checkbox"> Syrup</label>
                <label class="checkbox-item"><input type="checkbox"> Bandage</label>
                <label class="checkbox-item"><input type="checkbox"> Other</label>
            </div>

            <div class="other-input-box">
                <label style="font-size: 9px; color: #666;">If Other / Details (विवरण लिखें):</label>
                <input type="text" placeholder="Type instructions or items here...">
            </div>
        </div>

        <!-- Footer Area (Signature, Created By and Logo) -->
        <div class="footer-layout">
            <div class="created-by">
                <span style="display: block; font-size: 9px; color: #868e96; text-transform: uppercase;">Doctor Sign: _____________</span>
                <div style="margin-top: 10px;">Anushka Foundation Stamp: <input type="text" style="width: 110px; font-size: 11px; font-weight: normal; border-bottom: 1px dotted #999;"></div>
            </div>
            
            <div class="logo-area">
                <img src="https://www.anushkafoundationsandilahardoi.in/assets/images/logo.png" alt="Logo" class="foundation-logo">
            </div>
        </div>

        <!-- Horizontal Developer Tag at the bottom right corner -->
        <div class="developer-tag-row">
            <span class="dev-text">Slip Generation by itdts (+91-8299357488)</span>
        </div>

        <!-- Print Button -->
        <div class="actions">
            <button class="print-btn" onclick="window.print()">Print Patient Slip</button>
        </div>
    </div>

    <script>
        // Automatic date generator
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        document.getElementById('current-date').value = `${dd}/${mm}/${yyyy}`;
    </script>

</body>
</html>
